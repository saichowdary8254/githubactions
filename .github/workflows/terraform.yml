name: Terraform Deployment

on:
  push:
    branches: [ "main" ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      id-token: write   # REQUIRED for OIDC
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}    # <-- store the App Registration appId as a secret
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}    # <-- store your tenant as a secret
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}  # <-- store your subscription as a secret
          # No password/secret needed; OIDC handles token

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        run: terraform init

      - name: Terraform Plan
        run: terraform plan

      - name: Terraform Apply
        if: github.ref == 'refs/heads/main'
        run: terraform apply -auto-approve
